name: Run Neon Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Debug repo files
        run: |
          pwd
          ls -la
          echo "---- drizzle folder ----"
          ls -la drizzle

      - name: Test database connection
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "select current_database(), current_user, current_schema();"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "select 1;"

      - name: Run all migrations with hard fail
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          for file in drizzle/*.sql; do
            echo "=============================="
            echo "Running $file"
            echo "=============================="
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -a -f "$file"
          done

      - name: Show public tables
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "\dt public.*"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "select table_schema, table_name from information_schema.tables where table_schema not in ('pg_catalog','information_schema') order by table_schema, table_name;"
